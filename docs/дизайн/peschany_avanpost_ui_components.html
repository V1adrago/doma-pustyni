<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Песчаный аванпост — UI blocks</title>
  <style>
    :root{
      --bg:#090705;
      --panel:#12100d;
      --panel2:#1a140e;
      --gold:#f4b54a;
      --gold2:#ffd67b;
      --text:#f5e8c8;
      --sub:#e1c58b;
      --card-red1:#8e2a12;
      --card-red2:#2d130b;
      --locked1:#3a4350;
      --locked2:#151a20;
      --cta1:#6e3416;
      --cta2:#371b0a;
      --radius:20px;
      --shadow:0 0 18px rgba(255, 190, 85, .35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:linear-gradient(180deg,#2c1b10 0%,#120e0a 45%,#090705 100%);
      color:var(--text);
      font-family:Georgia, 'Times New Roman', serif;
    }
    .phone{
      width:min(100vw,430px);
      min-height:100vh;
      margin:0 auto;
      padding:14px 14px 24px;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 70% 22%, rgba(255,193,94,.35), transparent 30%),
        linear-gradient(180deg, rgba(20,14,10,.25), rgba(10,8,6,.7));
    }
    .row{display:flex;gap:12px;align-items:stretch}
    .panel{
      background:linear-gradient(180deg,#17120d,#0e0b08);
      border:2px solid rgba(244,181,74,.7);
      border-radius:22px;
      box-shadow:inset 0 0 0 1px rgba(255,214,123,.15);
    }
    .player{flex:1;padding:10px 12px 12px 92px;min-height:100px;position:relative}
    .shield{
      position:absolute;left:8px;top:-6px;width:72px;height:88px;
      background:linear-gradient(180deg,#7b2512,#51170e);
      clip-path:polygon(50% 0%, 92% 13%, 86% 69%, 50% 100%, 14% 69%, 8% 13%);
      border:2px solid var(--gold); display:flex; align-items:flex-end; justify-content:center;
      box-shadow:var(--shadow);
    }
    .shield span{margin-bottom:8px;font-size:26px;font-weight:700}
    .name{font-size:28px;font-weight:700;line-height:1}
    .house{font-size:20px;color:var(--gold2);margin-top:4px}
    .bar{height:12px;border-radius:999px;background:#25170f;border:1px solid #8f6526;margin-top:10px;overflow:hidden}
    .bar > i{display:block;height:100%;width:54%;background:linear-gradient(90deg,#d7a046,#f0c468)}
    .bar-label{font-size:13px;color:var(--sub);margin-top:5px;text-align:right}
    .resources{width:44%;min-width:170px;padding:12px}
    .res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .res-item{display:flex;gap:8px;align-items:center}
    .gem,.spice{width:26px;height:26px;display:inline-block}
    .spice{background:radial-gradient(circle at 30% 30%,#f0aa32,#d17f18 60%,#a6560d 100%);border-radius:50% 50% 45% 55%}
    .gem{background:linear-gradient(180deg,#34d69a,#0e8d63);clip-path:polygon(50% 0,100% 35%,80% 100%,20% 100%,0 35%)}
    .res-num{font-size:18px;font-weight:700}
    .res-label{font-size:12px;color:var(--sub)}
    .header{text-align:center;padding:22px 10px 8px}
    .header h1{margin:0;font-size:34px;letter-spacing:1px}
    .header .sub{font-size:18px;color:var(--sub);margin-top:8px}
    .diamond-mini{width:20px;height:20px;margin:14px auto 0;background:#5e3a18;border:2px solid var(--gold);transform:rotate(45deg)}
    .battle{
      width:72vw; max-width:300px; aspect-ratio:1/1; margin:28px auto 18px;
      position:relative; transform:rotate(45deg);
      background:linear-gradient(180deg,var(--cta1),var(--cta2));
      border:4px solid var(--gold); box-shadow:0 0 20px rgba(255,191,71,.55);
      display:flex; align-items:center; justify-content:center;
    }
    .battle::before{content:"";position:absolute;inset:12px;border:1px solid rgba(255,214,123,.45)}
    .battle > span{transform:rotate(-45deg);font-size:54px;font-weight:700}
    .collection{
      display:flex;align-items:center;justify-content:center;gap:14px;
      height:76px; border-radius:24px; margin:0 auto 22px; width:86%;
      background:linear-gradient(180deg,#2a170d,#16100b);
      border:3px solid var(--gold); box-shadow:var(--shadow);
      font-size:26px; font-weight:700;
    }
    .cards-icon{width:34px;height:34px;position:relative}
    .cards-icon::before,.cards-icon::after{content:"";position:absolute;background:#f3e1b8;border-radius:4px;width:22px;height:28px}
    .cards-icon::before{left:2px;top:4px}.cards-icon::after{left:12px;top:0}
    .factions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:4px}
    .card{
      aspect-ratio:0.66/1; border-radius:18px; overflow:hidden; position:relative;
      border:2px solid rgba(255,214,123,.35); background:linear-gradient(180deg,var(--locked1),var(--locked2));
      display:flex; align-items:flex-end; justify-content:center; padding:10px; text-align:center;
    }
    .card.active{
      background:linear-gradient(180deg,var(--card-red1),var(--card-red2));
      border-color:var(--gold); box-shadow:var(--shadow);
    }
    .card .title{position:relative;z-index:2;font-size:18px;font-weight:700;line-height:1.1}
    .card.locked::before,.card.locked::after{
      content:"";position:absolute;left:8%;right:8%;top:50%;height:2px;background:rgba(220,225,230,.45);transform-origin:center;
    }
    .card.locked::before{transform:rotate(45deg)}
    .card.locked::after{transform:rotate(-45deg)}
    .lock{
      position:absolute;left:50%;top:46%;transform:translate(-50%,-50%) rotate(45deg);
      width:48px;height:48px;background:#1a1b20;border:2px solid #d0d3d9;
    }
    .lock i,.lock b{position:absolute;left:50%;transform:translateX(-50%) rotate(-45deg)}
    .lock i{top:12px;width:16px;height:11px;border:2px solid #d0d3d9;border-top:none;border-radius:0 0 3px 3px}
    .lock b{top:5px;width:12px;height:9px;border:2px solid #d0d3d9;border-bottom:none;border-radius:10px 10px 0 0}
    .rating{
      width:48%;height:54px;margin:16px auto 0;border-radius:18px;
      display:flex;align-items:center;justify-content:center;gap:12px;
      background:linear-gradient(180deg,#26150d,#16100b);border:2px solid rgba(244,181,74,.8)
    }
    .bars{display:flex;gap:4px;align-items:flex-end;height:20px}
    .bars span{width:8px;background:#e1b65e}.bars span:nth-child(1){height:10px}.bars span:nth-child(2){height:18px}.bars span:nth-child(3){height:14px}
    @media (max-width:390px){
      .header h1{font-size:30px}
      .battle > span{font-size:46px}
      .collection{font-size:22px;height:68px}
      .card .title{font-size:16px}
    }
  </style>
</head>
<body>
  <main class="phone">
    <section class="row">
      <div class="player panel">
        <div class="shield"><span>12</span></div>
        <div class="name">Игрок</div>
        <div class="house">Дом Чести</div>
        <div class="bar"><i></i></div>
        <div class="bar-label">1250 / 2000</div>
      </div>
      <div class="resources panel">
        <div class="res-grid">
          <div class="res-item"><span class="spice"></span><div><div class="res-num">4 250</div><div class="res-label">Специи</div></div></div>
          <div class="res-item"><span class="gem"></span><div><div class="res-num">560</div><div class="res-label">Кристаллы</div></div></div>
        </div>
      </div>
    </section>

    <section class="header">
      <h1>ПЕСЧАНЫЙ АВАНПОСТ</h1>
      <div class="sub">Уровень 1</div>
      <div class="diamond-mini"></div>
    </section>

    <button class="battle" aria-label="В бой"><span>В БОЙ</span></button>
    <button class="collection"><span class="cards-icon"></span><span>Коллекция карт</span></button>

    <section class="factions">
      <button class="card active"><div class="title">ДОМ<br>ЧЕСТИ</div></button>
      <button class="card locked"><span class="lock"><b></b><i></i></span><div class="title">ДОМ<br>ЖЕЛЕЗА</div></button>
      <button class="card locked"><span class="lock"><b></b><i></i></span><div class="title">ПУСТЫННЫЕ<br>КЛАНЫ</div></button>
      <button class="card locked"><span class="lock"><b></b><i></i></span><div class="title">ОРДЕН<br>ГОЛОСА</div></button>
    </section>

    <button class="rating"><span class="bars"><span></span><span></span><span></span></span><span>Рейтинг</span></button>
  </main>
</body>
</html>
